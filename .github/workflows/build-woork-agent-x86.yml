name: Build Woork Agent Installer x86

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Agent version"
        required: true
        default: "1.0.0"

jobs:
  build-windows-installer-x86:
    name: Build Windows x86 installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: woork-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 32-bit
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"
          cache: "pip"
          cache-dependency-path: woork-agent/pyproject.toml

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Download WinSW x86
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path deploy\winsw | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x86.exe" `
            -OutFile "deploy\winsw\WinSW-x86.exe"
          if (-not (Test-Path "deploy\winsw\WinSW-x86.exe")) {
            throw "WinSW x86 download failed."
          }

      - name: Build installer x86
        shell: powershell
        run: .\deploy\windows\build-installer.ps1 -Architecture x86

      - name: Show release files
        shell: powershell
        run: Get-ChildItem -Recurse release | Format-Table FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoorkAgentSetup-x86-${{ github.event.inputs.version || '1.0.0' }}
          path: woork-agent/release/WoorkAgentSetup-x86-*.exe
          if-no-files-found: error
